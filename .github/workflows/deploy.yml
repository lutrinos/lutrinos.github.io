name: Deploy to GitHub Pages

on:
  # Trigger this "workflow" every time you push to the `main` branch
  # If you use a different branch name, replace `main` with your branch name as needed
  push:
    branches: [ main ]
  # Allow you to manually trigger this "workflow" in the Actions tab on GitHub
  workflow_dispatch:

# Allow job to clone repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v5
      - name: Install, build, and upload your site
        uses: withastro/action@v5
        with:
          package-manager: pnpm@9.14.4
          build-cmd: pnpm run build
        # env:
          # PUBLIC_POKEAPI: 'https://pokeapi.co/api/v2' # 对变量值使用单引号。（可选）

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4