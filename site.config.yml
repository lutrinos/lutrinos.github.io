# Site Configuration
site:
    # Site URL (ending with a slash)
    siteURL: "https://lutrinos.github.io/"
    # Site Title
    title: "Lutrinos"
    # Site Subtitle
    subtitle: ""
    # Language Configuration
    lang: "fr"
 
    # Time Zone Configuration
    timeZone: 2

    # Font Configuration
    font:
        # Example font configuration - Zen Maru Gothic
        "Example - ZenMaruGothic":
            # Font source (Font CSS link | Font file path)
            src: "https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap"
            # Font name (font-family)
            family: "Zen Maru Gothic"
    # Theme Color Configuration
    themeColor:
        # Default hue of the theme color (range from 0 to 360. e.g., Red: 0, Cyan: 200, Teal: 250, Pink: 345)
        hue: 255
    # Default Theme ("system" follows system | "light" light mode | "dark" dark mode)
    defaultTheme: "light"

    # favicon configuration
    favicon: []
    # bangumi configuration
    bangumi:
        # User ID
        userId: "your-bangumi-id"

# Analytics Configuration
analytics:
    # Whether to show analytics
    enabled: false
    # Analytics platform
    platform: "umami"
    # Umami config
    umami:
        # Umami API address
        baseUrl: "https://api.umami.is"
        # API key
        apiKey: ""
        # Tracking code
        code: ""

# Sidebar Layout Configuration
sidebar:
    # Sidebar component configuration list (sidebar component presets are located in WidgetComponentType in src/types/config.ts)
    components:
        # Left sidebar
        left:
            - # Component - Profile (preset)
              # Type
              type: "profile"
              # Position strategy ("top" fixed at the top | "sticky" sticky)
              position: "top"
              # Page visibility configuration
              visibility:
                  # Matching mode: 'include' (include), 'exclude' (exclude)
                  mode: "exclude"
                  # Page path matching rules list (supports regular expression strings)
                  paths: ["^/posts/", "^/archive"]
            - # Component - Directory (preset)
              # Type
              type: "directory"
              # Position strategy ("top" fixed at the top | "sticky" sticky)
              position: "sticky"
            - # Component - Post Categories (preset)
              # Type
              type: "categories"
              # Position strategy ("top" fixed at the top | "sticky" sticky)
              position: "sticky"
              # Responsive configuration
              responsive:
                  # Collapse threshold
                  collapseThreshold: 5
              # Directory depth
              depth: 3
            - # Component - Post Tags (preset)
              # Type
              type: "tags"
              # Position strategy ("top" fixed at the top | "sticky" sticky)
              position: "sticky"
              # Responsive configuration
              responsive:
                  # Collapse threshold
                  collapseThreshold: 20
        # Right sidebar
        right:
            - # Component - Announcement (preset)
              # Type
              type: "announcement"
              # Position strategy ("top" fixed at the top | "sticky" sticky)
              position: "top"
              # Page visibility configuration
              visibility:
                  # Matching mode: 'include' (include), 'exclude' (exclude)
                  mode: "include"
                  # Page path matching rules list (supports regular expression strings)
                  paths: ["^/$"]
            - # Component - Post TOC (preset)
              # Type
              type: "toc"
              # Position strategy ("top" fixed at the top | "sticky" sticky)
              position: "sticky"
              # Directory depth (1-6, 1 means only display h1 titles, 2 means display h1 and h2 titles, and so on)
              depth: 3
            - # Component - Post Statistics (preset)
              # Type
              type: "statistics"
              # Position strategy ("top" fixed at the top | "sticky" sticky)
              position: "sticky"
              # Page visibility configuration
              visibility:
                  # Matching mode: 'include' (include), 'exclude' (exclude)
                  mode: "include"
                  # Page path matching rules list (supports regular expression strings)
                  paths: ["^/$", "^/archive$"]

# Profile Configuration
profile:
    # Avatar configuration (relative to /public directory)
    avatar: "/assets/images/icon.png"
    # Information configuration
    name: "Lutrinos"
    # Bio configuration
    bio: "Yo"
    # Link configuration
    links:
        - # Link example
          # Name
          name: "GitHub"
          # Icon
          icon: "fa6-brands:github"
          # Link
          url: "https://github.com/lutrinos"

# Announcement Feature Configuration Description
announcement:
    # Announcement title
    title: "Announcement"
    # Announcement content
    content: "Welcome to my blog!"
    # Allow users to close the announcement
    closable: true
    # Link configuration
    link:
        # Enable link
        enable: true
        # Link text
        text: "Learn More"
        # Link URL
        url: "/about/"
        # Whether it's an external link
        external: false

# Post Settings
post:
    # Show "Last Modified" card
    showLastModified: true
    # Code highlighting configuration
    expressiveCode:
        # Theme
        theme: "github-dark"
    # License configuration
    license:
        # Enable license
        enable: false
        # License name
        name: "CC BY-NC-SA 4.0"
        # License link
        url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"

# Enable Footer Feature
footer:
    # Enable Footer HTML injection feature
    enable: false
    # Custom HTML content, used to add record numbers and other information
    customHtml: ""
